name: Autofix (push to main)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

# Cancel any in-progress run when a new push happens
concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    # Skip if this is already an autofix commit to prevent infinite loop
    if: "!contains(github.event.head_commit.message, 'chore: autofix')"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        if: ${{ hashFiles('**/*.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ruff + Black + isort
        if: ${{ hashFiles('**/*.py') != '' }}
        run: |
          pip install ruff black isort --quiet
          ruff check . --fix --ignore E501 || true
          isort . --profile black || true
          black . --quiet || true

      - name: Commit & push fixes
        run: |
          git add -A
          git restore --staged .github/workflows || true
          if git diff --cached --quiet; then
            echo "Nothing to fix"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git commit -m "chore: autofix (ESLint/Prettier, Ruff/Black/isort)"
          git push origin HEAD:main
